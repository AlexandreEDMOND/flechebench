<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FlecheBench Grid Viewer</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Avenir Next", "Segoe UI", ui-sans-serif, system-ui, sans-serif;
      --ink: #151515;
      --muted: #6a6f75;
      --line: #25282b;
      --paper: #f5f6f7;
      --clue: #dde9f2;
      --answer: #ffffff;
      --accent: #0b6f8f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
    }
    header {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #d8dde2;
      background: #fff;
    }
    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }
    input[type="file"] {
      max-width: 320px;
    }
    main {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) 380px;
      gap: 18px;
      padding: 18px;
      align-items: start;
    }
    .panel {
      background: #fff;
      border: 1px solid #d8dde2;
      border-radius: 8px;
      overflow: hidden;
    }
    .meta {
      padding: 12px 14px;
      border-bottom: 1px solid #e5e9ed;
      color: var(--muted);
      font-size: 14px;
    }
    .grid-wrap {
      overflow: auto;
      padding: 14px;
    }
    .grid {
      display: grid;
      width: max-content;
      border: 2px solid var(--line);
      background: var(--line);
      gap: 1px;
    }
    .cell {
      width: 74px;
      height: 74px;
      position: relative;
      background: var(--answer);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .answer-letter {
      font-size: 30px;
      font-weight: 750;
      line-height: 1;
    }
    .clue-cell {
      background: var(--clue);
      align-items: stretch;
      justify-content: stretch;
      padding: 3px;
    }
    .clue-entry {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 2px 12px 2px 3px;
      text-align: center;
      font-size: 9px;
      font-weight: 700;
      line-height: 1.05;
      overflow: hidden;
      word-break: break-word;
    }
    .clue-entry + .clue-entry {
      border-top: 1px solid #8ea5b4;
    }
    .arrow {
      position: absolute;
      right: 2px;
      bottom: 1px;
      color: var(--accent);
      font-size: 15px;
      font-weight: 900;
    }
    .entries {
      max-height: calc(100vh - 122px);
      overflow: auto;
    }
    .entry {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid #edf0f2;
      font-size: 14px;
    }
    .entry-id {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .answer {
      margin-top: 3px;
      font-weight: 800;
      letter-spacing: .04em;
    }
    .empty {
      padding: 28px;
      color: var(--muted);
    }
    @media (max-width: 980px) {
      main {
        grid-template-columns: 1fr;
      }
      .entries {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>FlecheBench Grid Viewer</h1>
    <input id="file-input" type="file" accept=".json,application/json">
  </header>
  <main>
    <section class="panel">
      <div id="meta" class="meta">Sélectionne un JSON généré par <code>scripts/scrape_leparisien.py</code>.</div>
      <div id="grid-wrap" class="grid-wrap">
        <div class="empty">Aucune grille chargée.</div>
      </div>
    </section>
    <aside class="panel entries" id="entries">
      <div class="empty">Les définitions et réponses apparaîtront ici.</div>
    </aside>
  </main>
  <script>
    const input = document.querySelector("#file-input");
    const meta = document.querySelector("#meta");
    const gridWrap = document.querySelector("#grid-wrap");
    const entriesPanel = document.querySelector("#entries");

    const arrows = {
      hd: "→",
      hb: "↓",
      bd: "→",
      bb: "↓",
      td: "→",
      gb: "↓"
    };

    input.addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const puzzle = JSON.parse(await file.text());
      renderPuzzle(puzzle);
    });

    function renderPuzzle(puzzle) {
      const entriesById = new Map(puzzle.entries.map((entry) => [entry.entry_id, entry]));
      const clueCellByCoord = new Map(
        puzzle.clue_cells.map((cell) => [`${cell.row}:${cell.column}`, cell])
      );

      meta.textContent = `${puzzle.puzzle_id} · force ${puzzle.force} · ${puzzle.published_on || "date inconnue"} · ${puzzle.entries.length} définitions`;

      const grid = document.createElement("div");
      grid.className = "grid";
      grid.style.gridTemplateColumns = `repeat(${puzzle.width}, 74px)`;

      for (let row = 0; row < puzzle.height; row += 1) {
        for (let column = 0; column < puzzle.width; column += 1) {
          const value = puzzle.grid[row][column];
          const clueCell = clueCellByCoord.get(`${row}:${column}`);
          const cell = document.createElement("div");
          cell.className = clueCell ? "cell clue-cell" : "cell";

          if (clueCell) {
            for (const entryId of clueCell.entries) {
              const entry = entriesById.get(entryId);
              const clue = document.createElement("div");
              clue.className = "clue-entry";
              clue.textContent = entry.clue;
              const arrow = document.createElement("span");
              arrow.className = "arrow";
              arrow.textContent = arrows[entry.clue_cell.arrow] || "";
              clue.appendChild(arrow);
              cell.appendChild(clue);
            }
          } else if (/^[A-Z]$/.test(value)) {
            const letter = document.createElement("div");
            letter.className = "answer-letter";
            letter.textContent = value;
            cell.appendChild(letter);
          }

          grid.appendChild(cell);
        }
      }

      gridWrap.replaceChildren(grid);
      renderEntries(puzzle.entries);
    }

    function renderEntries(entries) {
      const nodes = entries.map((entry) => {
        const row = document.createElement("div");
        row.className = "entry";
        row.innerHTML = `
          <div class="entry-id">${entry.entry_id}</div>
          <div>
            <div>${escapeHtml(entry.clue)}</div>
            <div class="answer">${escapeHtml(entry.answer)}</div>
          </div>
        `;
        return row;
      });
      entriesPanel.replaceChildren(...nodes);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
